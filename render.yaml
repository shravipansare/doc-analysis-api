services:
  - type: web
    name: doc-analysis-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: "apt-get install -y tesseract-ocr poppler-utils libglib2.0-0 libsm6 libxext6 && pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SERVICE_API_KEY
        sync: false
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
